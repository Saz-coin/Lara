kind = "mobile"
previewPath = "/"
title = "Faith AI"
version = "1.0.0"
id = "artifacts/christian-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22260

[services.development]
run = "pnpm --filter @workspace/christian-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/christian-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/christian-ai", "run", "serve" ]

[services.env]
PORT = "22260"
BASE_PATH = "/"
